name: Update Unraid Template VER

on:
  schedule:
    - cron: "0 0,12 * * *"  # At 00:00 and 12:00 UTC
  workflow_dispatch:

jobs:
  update-template:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Scrape and update VER
        id: update_ver
        run: |
          python3 - <<'EOF'
          import requests, re, os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          url = "https://www.feed-the-beast.com/modpacks/126-ftb-presents-direwolf20-121"
          xml_path = Path("ftbdirewolf201.21_server.xml")

          print("🔎 Fetching latest modpack version...")

          res = requests.get(url, timeout=30)
          res.raise_for_status()

          # Strip HTML and extract "Latest Version ID <number>"
          clean = re.sub(r'<[^>]+>', ' ', res.text)
          match = re.search(r'Latest\s+Version\s+ID\s+(\d+)', clean, flags=re.I)

          if not match:
              print("❌ Could not find Latest Version ID on page")
              exit(1)

          latest_ver = match.group(1)
          print(f"📦 Latest version found: {latest_ver}")

          # Read current XML
          original = xml_path.read_text(encoding="utf-8")
          current_match = re.search(
              r'<Config[^>]*Name="VER"[^>]*Default="(\d+)"',
              original
          )
          current_ver = current_match.group(1) if current_match else "Unknown"
          print(f"📁 Current version in XML: {current_ver}")

          if current_ver == latest_ver:
              print("✅ No update needed. Version unchanged.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("updated=false\n")
              exit(0)

          # Update XML
          tree = ET.parse(xml_path)
          root = tree.getroot()

          for config in root.findall("Config"):
              if config.attrib.get("Name") == "VER":
                  config.set("Default", latest_ver)
                  config.text = latest_ver
                  break

          def pretty_print(elem, level=0):
              indent = "  "
              pad = indent * level

              if elem.tag == "Config":
                  out = f"{pad}<{elem.tag}\n"
                  for k, v in elem.attrib.items():
                      out += f"{pad}{indent}{k}=\"{v}\"\n"
                  if elem.text and elem.text.strip():
                      out = out.rstrip() + f">{elem.text}</{elem.tag}>\n"
                  else:
                      out = out.rstrip() + "/>\n"
                  return out

              if not elem.text and len(elem) == 0:
                  return f"{pad}<{elem.tag}/>\n"

              out = f"{pad}<{elem.tag}>\n"
              for child in elem:
                  out += pretty_print(child, level + 1)
              out += f"{pad}</{elem.tag}>\n"
              return out

          final_xml = '<?xml version="1.0"?>\n' + pretty_print(root)

          if final_xml != original:
              print("✏️ Updating XML file with new version...")
              xml_path.write_text(final_xml, encoding="utf-8")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("updated=true\n")
                  f.write(f"version={latest_ver}\n")
          else:
              print("⚠️ XML already up to date.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("updated=false\n")
          EOF

      - name: Commit and push if updated
        if: steps.update_ver.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "sam10155"
          git config user.email "36243971+sam10155@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git commit -am "Update VER to ${{ steps.update_ver.outputs.version }}"
          git push
