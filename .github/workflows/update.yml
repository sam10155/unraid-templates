name: Update Unraid Template VER

on:
  schedule:
    - cron: "0 0,12 * * *"  # At 00:00 and 12:00 UTC
  workflow_dispatch:

jobs:
  update-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests beautifulsoup4
      

      - name: Scrape and update VER
        id: update_ver
        run: |
          python3 - <<EOF
          import requests, re, os, io
          import xml.etree.ElementTree as ET
          from bs4 import BeautifulSoup
          from pathlib import Path

          url = "https://www.feed-the-beast.com/modpacks/126-ftb-presents-direwolf20-121"
          xml_path = Path("ftbdirewolf201.21_server.xml")

          print("🔎 Fetching latest modpack version...")

          # Grab latest version ID
          r = requests.get(url)
          soup = BeautifulSoup(r.text, "html.parser")
          latest_ver = soup.find("div", class_="Badge_value__1GilC").text.strip()
          print(f"📦 Latest version found: {latest_ver}")

          # Grab current version ID from XML
          original = xml_path.read_text()
          current_match = re.search(r'<Config[^>]*Name="VER"[^>]*Default="(\d+)"', original)
          current_ver = current_match.group(1) if current_match else "Unknown"
          print(f"📁 Current version in XML: {current_ver}")

          # Compare Version ID
          if current_ver == latest_ver:
              print("✅ No update needed. Version unchanged.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("updated=false\n")
              exit(0)

          # Replace updated VER ID in xml file
          tree = ET.parse(xml_path)
          root = tree.getroot()
          for config in root.findall('Config'):
              if config.attrib.get('Name') == 'VER':
                  config.set('Default', latest_ver)
                  config.text = latest_ver
                  break

          # Serialize updated XML to string buffer with declaration
          buf = io.BytesIO()
          tree.write(buf, encoding='utf-8', xml_declaration=True)
          new_xml_text = buf.getvalue().decode('utf-8')

          if original != new_xml_text:
              print("✏️ Updating XML file with new version...")
              xml_path.write_text(new_xml_text, encoding='utf-8')
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("updated=true\n")
                  f.write(f"version={latest_ver}\n")
          else:
              print("⚠️ Content already up to date.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("updated=false\n")
          EOF

      - name: Commit and push if updated
        if: steps.update_ver.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "sam10155"
          git config user.email "36243971+sam10155@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git commit -am "Update VER to ${{ steps.update_ver.outputs.version }}"
          git push
